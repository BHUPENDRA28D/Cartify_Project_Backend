spring:
  application:
    name: cartify

  datasource:
    url: jdbc:mysql://localhost:3306/cartify_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: admin
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update   # use validate in production
    show-sql: true
    properties:
        hibernate:
          format_sql: true



#  servlet:
#    multipart:
#      enabled: true
#      max-file-size: 10MB
#      max-request-size: 10MB

server:
  port: 8080
#  servlet:
#    context-path: /api

# ================= JWT CONFIG =================

jwt:
  secret: 8f7a6b5c4d3e2f1a9b8c7d6e5f4a3b2c1d9e8f7a6b5c4d3e2f1a9b8c7d6e5f4
  expiration: 1800000          # 30 minutes (Access Token)
  refresh:
    expiration: 604800000      # 7 days (Refresh Token)
  cookie:
    secure: false              # true in production (HTTPS)
    http-only: true
    same-site: Strict

